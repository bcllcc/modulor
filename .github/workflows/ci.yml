name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e .[dev]
      - run: pytest tests -q
      - name: smoke the examples
        run: |
          modulor run out/studio.json examples/floorplan.json
          modulor run out/bracket.json examples/bracket.json
          modulor run out/zaha.json examples/zaha.json
