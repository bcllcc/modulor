name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g @anthropic-ai/claude-code
      - name: validate Claude Code plugin manifests
        run: |
          claude plugin validate .
          claude plugin validate integrations/claude-code/modulor-plugin

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e .[dev]
      - run: pytest tests -q
      - name: smoke the examples
        run: |
          modulor run out/studio.json examples/floorplan.json
          modulor run out/bracket.json examples/bracket.json
          modulor run out/zaha.json examples/zaha.json
          modulor run out/urban.json examples/urban.json
