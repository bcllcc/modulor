name: Publish to MCP Registry

# Publishes server.json to the official MCP registry
# (registry.modelcontextprotocol.io) using GitHub Actions OIDC — the
# io.github.bcllcc/* namespace is authenticated by this repository's
# identity, no tokens needed. Runs after each version tag, or manually.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish-mcp:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
      - name: Wait for PyPI to serve the tagged version
        if: github.ref_type == 'tag'
        run: |
          V="${GITHUB_REF_NAME#v}"
          for i in $(seq 1 30); do
            curl -sf "https://pypi.org/pypi/modulor/$V/json" >/dev/null && exit 0
            sleep 10
          done
          echo "PyPI never served $V" >&2; exit 1
      - name: Login (GitHub OIDC)
        run: ./mcp-publisher login github-oidc
      - name: Publish
        run: ./mcp-publisher publish
